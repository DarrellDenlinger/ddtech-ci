# /etc/nginx/nginx.conf

# create one worker process per CPU core
worker_processes auto;

events {
  worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                 '$status $body_bytes_sent "$http_referer" '
                 '"$http_user_agent" "$http_x_forwarded_for"'
                 'host=$host server=$server_name';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Quality + hardening
    server_tokens off;
    sendfile on;
    keepalive_timeout 65;

    # Enhanced gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types
      text/plain
      text/css
      text/xml
      text/javascript
      application/javascript
      application/json
      application/xml+rss
      application/atom+xml
      image/svg+xml;
    gzip_min_length 256;

    # Rate limiting zones
    # with Cloudflare in front all requests appear to come from Cloudflare IP
    # we don't want to rate limit on that, we want the actual user IP
    # we could use $http_cf_connecting_ip instead of $binary_remote_addr
    # but if we configure this we get the visitor's IP automatically in $binary_remote_addr
    real_ip_header CF-Connecting-IP;
    # (must include Cloudflare IP ranges)
    include /etc/nginx/cloudflare.conf;
    real_ip_recursive on;

    # now we can use the ordinary zone syntax
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=1r/s;  
    # limit_req_zone $http_cf_connecting_ip zone=api:10m rate=10r/s;
    # limit_req_zone $http_cf_connecting_ip zone=general:10m rate=1r/s;

    # If behind other proxies, uncomment and configure:
    # real_ip_header X-Forwarded-For;
    # set_real_ip_from 10.0.0.0/8;
    # set_real_ip_from 172.16.0.0/12;
    # set_real_ip_from 192.168.0.0/16;

    # WebSocket/HTTP upgrade helper
    map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
    }


    # Global SSL tuning - applies everywhere
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers                   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Pull in all site configs automatically
    include /etc/nginx/sites-enabled/*.conf;
}
