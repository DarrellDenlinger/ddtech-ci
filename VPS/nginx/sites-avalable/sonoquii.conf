# /etc/nginx/sites-available/sonoquii.conf

# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name sonoquii.com www.sonoquii.com beta.sonoquii.com cdn.sonoquii.com;
    return 301 https://$host$request_uri;
}

# Main app
server {
    listen 443 ssl http2;
    server_name sonoquii.com www.sonoquii.com;

    include snippets/ssl-sonoquii.conf;
    include snippets/security-headers.conf;

    access_log /var/www/sonoquii.com/logs/nginx-access.log;
    error_log  /var/www/sonoquii.com/logs/nginx-error.log;

    # change this back to dist once you start building a distribution
    # root /var/www/sonoquii.com/repo/client/dist;


    location /socket.io {
        include snippets/proxy-params-ws.conf;
        proxy_pass http://127.0.0.1:3000;
    }

    location /api {
        include snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3000;
    }

    # magic sauce - /g /q tells us whether the user scanned a qr code or typed in a url, only qr code urls start with /q
    # this way we know how the user got here and we know if they used their default browser on mobile
    # example: https:/sonoquii.com/q/pawd   this is from a qr code, requesting to check in to group pawd

    location /q {
      include snippets/proxy-params.conf;
      proxy_pass http://127.0.0.1:3000;
    }

    location /g {
      include snippets/proxy-params.conf;
      proxy_pass http://127.0.0.1:3000;
    }

#    location / {
#        # do not include snippets/proxy-params.conf; as that is just for Express
#        try_files $uri $uri/ /index.html;
#    }
 
    # while running client under vite server
    location / {
        include snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:4004;
    }
}

# Beta
server {
    listen 443 ssl http2;
    server_name beta.sonoquii.com;

    include snippets/ssl-sonoquii.conf;
    include snippets/security-headers.conf;

    access_log /var/www/sonoquii.com/logs/nginx-beta-access.log;
    error_log  /var/www/sonoquii.com/logs/nginx-beta-error.log;

    location /socket.io {
        include snippets/proxy-params-ws.conf;
        proxy_pass http://127.0.0.1:3001;
    }

    location /api {
        include snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3001;
    }

    location / {
        include snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3001;
    }
}

# CDN - static files only, no proxy
server {
    listen 443 ssl http2;
    server_name cdn.sonoquii.com;

    include snippets/ssl-sonoquii.conf;
    include snippets/security-headers.conf;

    access_log /var/www/sonoquii.com/logs/nginx-cdn-access.log;
    error_log  /var/www/sonoquii.com/logs/nginx-cdn-error.log;

    root /var/www/sonoquii.com/cdn/assets;
    
    location / {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}