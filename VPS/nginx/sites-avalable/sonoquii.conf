# /etc/nginx/sites-available/sonoquii.conf

# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name sonoquii.com www.sonoquii.com beta.sonoquii.com cdn.sonoquii.com;
    return 301 https://$host$request_uri;
}

# Main app
server {
    listen 443 ssl http2;
    server_name sonoquii.com www.sonoquii.com;

    include snippets/ssl-sonoquii.conf;
    include snippets/security-headers.conf;

    access_log /var/www/sonoquii.com/logs/nginx-access.log;
    error_log  /var/www/sonoquii.com/logs/nginx-error.log;

    location /socket.io {
        include snippets/proxy-params-ws.conf;
        proxy_pass http://127.0.0.1:3000;
    }

    location /api {
        include snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3000;
    }

    location / {
        include snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3000;
    }
}

# Beta
server {
    listen 443 ssl http2;
    server_name beta.sonoquii.com;

    include snippets/ssl-sonoquii.conf;
    include snippets/security-headers.conf;

    access_log /var/www/sonoquii.com/logs/nginx-beta-access.log;
    error_log  /var/www/sonoquii.com/logs/nginx-beta-error.log;

    location /socket.io {
        include snippets/proxy-params-ws.conf;
        proxy_pass http://127.0.0.1:3001;
    }

    location /api {
        include snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3001;
    }

    location / {
        include snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:3001;
    }
}

# CDN - static files only, no proxy
server {
    listen 443 ssl http2;
    server_name cdn.sonoquii.com;

    include snippets/ssl-sonoquii.conf;
    include snippets/security-headers.conf;

    access_log /var/www/sonoquii.com/logs/nginx-cdn-access.log;
    error_log  /var/www/sonoquii.com/logs/nginx-cdn-error.log;

    root /var/www/sonoquii.com/cdn/assets;
    
    location / {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}