# /etc/nginx/snippets/security-headers.conf
#
# HTTP security response headers
# Included in each server block via:
#   include snippets/security-headers.conf;

# Prevent clickjacking - disallow embedding in iframes from other origins
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Force HTTPS for 1 year, include subdomains
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Control referrer information sent with requests
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Restrict access to browser features
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

# Content Security Policy
# 'self'         - allow resources from same origin
# we use styles and fonts from adobe and google
# google stylesheet from https://fonts.googleapis.com
# google font files from https://fonts.gstatic.com
# adobe stylesheet from https://use.typekit.net
# adobe font files from https://use.typekit.net   https://p.typekit.net
# Adjust as needed when you add third party scripts or styles
# ** Must be all on one line or it is invalid **

add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://use.typekit.net https://fonts.googleapis.com; font-src 'self' https://use.typekit.net https://p.typekit.net https://fonts.gstatic.com; img-src 'self' data: https://cdn.sonoquii.com; connect-src 'self' wss://sonoquii.com wss://beta.sonoquii.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;